<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="purgeless logo">
  <title>purgeless</title>
  <desc>A model cleaved into two clean color parts, joined at a single connector node — clean color separation, zero purge.</desc>
  <defs>
    <clipPath id="tile"><rect x="48" y="48" width="160" height="160" rx="26"/></clipPath>
  </defs>

  <!-- dark rounded tile -->
  <rect width="256" height="256" rx="56" fill="#0a0a0a"/>

  <!-- the model, cleaved along a clean diagonal into two color parts -->
  <g clip-path="url(#tile)">
    <!-- upper-left part, nudged up-left to open a crisp kerf along the seam -->
    <polygon points="45,45 205,45 45,205" fill="#a78bfa"/>
    <!-- lower-right part, nudged down-right -->
    <polygon points="211,51 211,211 51,211" fill="#06b6d4"/>
  </g>

  <!-- connector node straddling the seam: the parts rejoin, the cut is clean -->
  <circle cx="128" cy="128" r="11" fill="#0a0a0a"/>
  <circle cx="128" cy="128" r="11" fill="none" stroke="#fafafa" stroke-width="2.5"/>
</svg>
