<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="purgeless — AI meshes, ready to print, zero purge">
  <title>purgeless</title>
  <defs>
    <linearGradient id="fadeRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 L0 0 0 32" fill="none" stroke="#171717" stroke-width="1"/>
    </pattern>
    <clipPath id="emblem"><rect x="48" y="48" width="160" height="160" rx="26"/></clipPath>
    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .title    { font-size: 64px; font-weight: 600; fill: #fafafa; letter-spacing: -1.5px; }
      .accent   { fill: #a78bfa; }
      .muted    { fill: #737373; font-size: 18px; font-weight: 400; }
      .prompt   { fill: #525252; font-size: 18px; }
      .corner   { fill: none; stroke: #525252; stroke-width: 1; }
      .edge     { stroke: #404040; stroke-width: 1; fill: none; }
      .swatch-label { font-size: 11px; fill: #a3a3a3; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="320" fill="#0a0a0a"/>
  <rect width="1280" height="320" fill="url(#grid)" opacity="0.55"/>

  <!-- =================== LEFT: EMBLEM (figurine with color splits) =================== -->
  <g transform="translate(48, 32)">
    <!-- frame brackets -->
    <path class="corner" d="M0 12 V0 H12"/>
    <path class="corner" d="M244 0 H256 V12"/>
    <path class="corner" d="M256 244 V256 H244"/>
    <path class="corner" d="M12 256 H0 V244"/>

    <!-- glow -->
    <circle cx="128" cy="128" r="80" fill="url(#hubGlow)"/>

    <!-- cleave glyph: model split into two clean color parts, joined at a connector node -->
    <g clip-path="url(#emblem)">
      <polygon points="45,45 205,45 45,205" fill="#a78bfa"/>
      <polygon points="211,51 211,211 51,211" fill="#06b6d4"/>
    </g>
    <circle cx="128" cy="128" r="11" fill="#0a0a0a"/>
    <circle cx="128" cy="128" r="11" fill="none" stroke="#fafafa" stroke-width="2.5"/>
  </g>

  <!-- =================== CENTER: TYPE =================== -->
  <g transform="translate(360, 0)">
    <text class="mono prompt"  x="0" y="120">~ $ purgeless ./model.3mf</text>
    <text class="mono title"   x="0" y="178">
      <tspan class="accent">purge</tspan><tspan fill="#fafafa">less</tspan>
    </text>
    <text class="mono muted"   x="0" y="214">// AI meshes → printable parts · zero AMS purge</text>

    <!-- chip row -->
    <g transform="translate(0, 244)" class="mono" font-size="13">
      <g>
        <rect x="0"   y="0" width="84" height="22" rx="4" fill="#171717" stroke="#262626"/>
        <text x="42"  y="15" text-anchor="middle" fill="#a3a3a3">tauri 2</text>
      </g>
      <g>
        <rect x="94"  y="0" width="92" height="22" rx="4" fill="#171717" stroke="#262626"/>
        <text x="140" y="15" text-anchor="middle" fill="#a3a3a3">trimesh</text>
      </g>
      <g>
        <rect x="196" y="0" width="100" height="22" rx="4" fill="#171717" stroke="#262626"/>
        <text x="246" y="15" text-anchor="middle" fill="#a3a3a3">three.js</text>
      </g>
      <g>
        <rect x="306" y="0" width="84" height="22" rx="4" fill="#171717" stroke="#262626"/>
        <text x="348" y="15" text-anchor="middle" fill="#a3a3a3">open3d</text>
      </g>
      <g>
        <rect x="400" y="0" width="84" height="22" rx="4" fill="#171717" stroke="#262626"/>
        <text x="442" y="15" text-anchor="middle" fill="#a3a3a3">sam2</text>
      </g>
      <g>
        <rect x="494" y="0" width="86" height="22" rx="4" fill="#1a0d0d" stroke="#7f1d1d"/>
        <circle cx="508" cy="11" r="3" fill="#ef4444"/>
        <text x="542" y="15" text-anchor="middle" fill="#fca5a5">v0.2</text>
      </g>
    </g>
  </g>

  <!-- =================== RIGHT: COLOR SWATCHES + REGION LEGEND =================== -->
  <g transform="translate(844, 70)">
    <text class="mono swatch-label" x="0" y="-8">// regions</text>
    <!-- 5 swatches, each = a detected color region -->
    <g>
      <rect x="0"   y="0" width="56" height="56" rx="6" fill="#ec4899"/>
      <text class="mono swatch-label" x="0" y="76">region 01</text>
    </g>
    <g transform="translate(72, 0)">
      <rect x="0" y="0" width="56" height="56" rx="6" fill="#fbbf24"/>
      <text class="mono swatch-label" x="0" y="76">region 02</text>
    </g>
    <g transform="translate(144, 0)">
      <rect x="0" y="0" width="56" height="56" rx="6" fill="#a78bfa"/>
      <text class="mono swatch-label" x="0" y="76">region 03</text>
    </g>
    <g transform="translate(216, 0)">
      <rect x="0" y="0" width="56" height="56" rx="6" fill="#06b6d4"/>
      <text class="mono swatch-label" x="0" y="76">region 04</text>
    </g>
    <g transform="translate(288, 0)">
      <rect x="0" y="0" width="56" height="56" rx="6" fill="#22c55e"/>
      <text class="mono swatch-label" x="0" y="76">region 05</text>
    </g>

    <!-- export step, kept short so it clears the right-edge fade -->
    <g transform="translate(0, 110)" class="mono swatch-label">
      <text x="0" y="0">→ region_01–05.stl · 5 printable parts</text>
    </g>
  </g>

  <!-- right-edge fade (pulled to the edge so it doesn't dim the swatches) -->
  <rect x="1200" y="0" width="80" height="320" fill="url(#fadeRight)"/>
</svg>
